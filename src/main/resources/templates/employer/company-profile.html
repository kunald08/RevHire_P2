<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Company Profile</title>
</head>

<body>

<div class="container mt-4">
	<!-- SUCCESS MESSAGE -->
	<div th:if="${success}" 
	     class="alert alert-success alert-dismissible fade show">
	    <span th:text="${success}"></span>
	    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>

    <!-- Top Header Row -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div class="d-flex align-items-center gap-3">
            <!-- Back Button -->
            <a th:href="@{/jobs/my}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>

            <h2 class="fw-bold mb-0">
                <i class="bi bi-building me-2"></i>Company Profile
            </h2>
        </div>

        <!-- Edit Button -->
        <a th:href="@{/employers/profile/edit}"
           class="btn btn-outline-primary">
            <i class="bi bi-pencil"></i> Edit Profile
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="fw-semibold mb-3"
                th:text="${employer.companyName}"></h4>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <strong>Industry:</strong>
                    <p th:text="${employer.industry}"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <strong>Company Size:</strong>
                    <p th:text="${employer.companySize}"></p>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <strong>Location:</strong>
                    <p th:text="${employer.location}"></p>
                </div>

                <div class="col-md-6 mb-3">
                    <strong>Website:</strong>
                    <p>
                        <a th:href="${employer.website}"
                           th:text="${employer.website}"
                           target="_blank"></a>
                    </p>
                </div>

            </div>

            <div class="mb-3">
                <strong>Description:</strong>
                <p th:text="${employer.description}"></p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
