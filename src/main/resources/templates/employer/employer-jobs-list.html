<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>
<div class="container mt-4">

    <h2 class="fw-bold mb-4">
        <i class="bi bi-briefcase-fill me-2 text-primary"></i> Job Management
    </h2>

    <form method="get" th:action="@{/employer/jobs}" class="row mb-3 g-2">
        <div class="col-md-4">
			<input type="text"
			       name="keyword"
			       th:value="${keyword}"
			       placeholder="🔍 Search by Job Title (e.g. Java Developer)"
			       class="form-control"
			       autocomplete="off">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Search
            </button>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0"> <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Job Title</th>
                    <th>Status</th>
                    <th>Deadline</th>
                    <th>Total Applicants</th>
                    <th class="text-end pe-4">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${jobsPage.isEmpty()}">
                    <td colspan="5" class="text-center py-4 text-muted">No jobs found.</td>
                </tr>
                
                <tr th:each="job : ${jobsPage.content}">
                    <td class="ps-4 fw-semibold" th:text="${job.title}"></td>

                    <td>
                        <div th:switch="${#strings.toString(job.status)}">
                            <span th:case="'ACTIVE'" class="badge bg-success-subtle text-success border border-success">ACTIVE</span>
                            <span th:case="'CLOSED'" class="badge bg-danger-subtle text-danger border border-danger">CLOSED</span>
                            <span th:case="*" class="badge bg-secondary" th:text="${job.status}">STATUS</span>
                        </div>
                    </td>

                    <td th:text="${job.deadline != null ? #temporals.format(job.deadline, 'dd MMM yyyy') : 'N/A'}"></td>

                    <td>
                        <span class="badge rounded-pill bg-primary" 
                              th:text="${job.applications != null ? job.applications.size() : 0}">0</span>
                    </td>

                    <td class="text-end pe-4">
                        <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-people"></i> Applicants
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${jobsPage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${jobsPage.first}? 'disabled'">
                <a class="page-link" th:href="@{/employer/jobs(page=${jobsPage.number-1}, keyword=${keyword}, size=${size})}">Previous</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, jobsPage.totalPages-1)}"
                th:classappend="${i == jobsPage.number}? 'active'">
                <a class="page-link" th:text="${i+1}" th:href="@{/employer/jobs(page=${i}, keyword=${keyword}, size=${size})}"></a>
            </li>

            <li class="page-item" th:classappend="${jobsPage.last}? 'disabled'">
                <a class="page-link" th:href="@{/employer/jobs(page=${jobsPage.number+1}, keyword=${keyword}, size=${size})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
