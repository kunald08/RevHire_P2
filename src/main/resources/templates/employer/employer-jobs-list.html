<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>
	<div class="container mt-4">
	    <h2 class="fw-bold mb-4">
	        <i class="bi me-2" th:classappend="${isReviewMode ? 'bi-clock-history text-warning' : 'bi-briefcase-fill text-primary'}"></i>
	        <span th:text="${(isReviewMode != null && isReviewMode) ? 'Pending Reviews' : 'Job Management'}"></span>
	    </h2>

	    <form method="get" 
	          th:action="${(isReviewMode != null && isReviewMode) ? '/employer/jobs/review' : '/employer/jobs'}" 
	          class="row mb-3 g-2">
	        <div class="col-md-4">
	            <input type="text" name="keyword" th:value="${keyword}" 
	                   placeholder="🔍 Search by Job Title" class="form-control">
	        </div>
	        <div class="col-md-2">
	            <button type="submit" class="btn btn-primary w-100">Search</button>
	        </div>
	    </form>

	    <div class="card shadow-sm border-0">
	        <div class="card-body p-0">
	            <table class="table table-hover align-middle mb-0">
	                <thead class="table-light">
	                    <tr>
	                        <th class="ps-4">Job Title</th>
	                        <th>Status</th>
	                        <th>Deadline</th>
	                        <th>Total Applicants</th>
	                        <th class="text-end pe-4">Action</th>
	                    </tr>
	                </thead>
	                <tbody>
	                    <tr th:if="${jobsPage.isEmpty()}">
	                        <td colspan="5" class="text-center py-4 text-muted">No jobs found.</td>
	                    </tr>
	                    <tr th:each="job : ${jobsPage.content}">
	                        <td class="ps-4" th:text="${job.title}"></td>
	                        <td>
	                            <span class="badge" 
	                                  th:classappend="${job.status == 'ACTIVE' ? 'bg-success-subtle text-success border border-success' : 'bg-danger-subtle text-danger border border-danger'}" 
	                                  th:text="${job.status}"></span>
	                        </td>
	                        <td th:text="${job.deadline != null ? #temporals.format(job.deadline, 'dd MMM yyyy') : 'N/A'}"></td>
							<td>
							    <span class="badge rounded-pill bg-primary" 
							          th:text="${isReviewMode ? (pendingCounts[job.id] != null ? pendingCounts[job.id] : 0) : (job.applications != null ? job.applications.size() : 0)}">
							        0
							    </span>
							</td>
							<td class="text-end pe-4">
							    <a th:href="${isReviewMode} 
							        ? @{/employer/jobs/review/{id}/applicants(id=${job.id})} 
							        : @{/employer/jobs/{id}/applicants(id=${job.id})}"
							       class="btn btn-sm btn-outline-primary">
							        <i class="bi bi-people"></i> 
							        <span>Applicants</span>
							    </a>
							</td>
	                    </tr>
	                </tbody>
	            </table>
	        </div>
	    </div>
	    </div>

		<div class="container mt-4" th:with="baseUrl=${(isReviewMode != null && isReviewMode) ? '/employer/jobs/review' : '/employer/jobs'}">
		    
		    <nav class="mt-4" th:if="${jobsPage.totalPages > 1}">
		        <ul class="pagination justify-content-center">
		            <li class="page-item" th:classappend="${jobsPage.first}? 'disabled'">
		                <a class="page-link" th:href="@{__${baseUrl}__(page=${jobsPage.number-1}, keyword=${keyword}, size=${size})}">Previous</a>
		            </li>

		            <li class="page-item" th:each="i : ${#numbers.sequence(0, jobsPage.totalPages-1)}"
		                th:classappend="${i == jobsPage.number}? 'active'">
		                <a class="page-link" th:text="${i+1}" th:href="@{__${baseUrl}__(page=${i}, keyword=${keyword}, size=${size})}"></a>
		            </li>

		            <li class="page-item" th:classappend="${jobsPage.last}? 'disabled'">
		                <a class="page-link" th:href="@{__${baseUrl}__(page=${jobsPage.number+1}, keyword=${keyword}, size=${size})}">Next</a>
		            </li>
		        </ul>
		    </nav>
		</div>
</div>
</body>

</html>
