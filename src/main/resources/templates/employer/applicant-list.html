<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Applicants</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-4">

    <h3>
        Job Title:
        <span class="text-primary" th:text="${jobTitle}"></span>
    </h3>

    <p>
        Total Applicants:
        <a th:href="@{/employer/jobs/{jobId}/applicants(jobId=${jobId})}"
           class="fw-bold text-primary">
            <span th:text="${totalApplicants}"></span>
        </a>
    </p>

    <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-outline-primary">Filter</button>

        <div>
            <button id="bulkShortlistBtn"
                    class="btn btn-success me-2"
                    disabled>
                Bulk Shortlist
            </button>

            <button id="bulkRejectBtn"
                    class="btn btn-danger"
                    disabled>
                Bulk Reject
            </button>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th><input type="checkbox" id="selectAll"></th>
            <th>Name</th>
            <th>Status</th>
            <th>Applied Date</th>
            <th>Employer Comment</th>
            <th>Reviewer Notes</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="app : ${applicants}">
            <td>
                <input type="checkbox"
                       class="appCheckbox"
                       th:value="${app.applicationId}">
            </td>
            <td th:text="${app.applicantName}"></td>
            <td th:text="${app.status}"></td>
            <td th:text="${#temporals.format(app.appliedDate, 'dd MMM yyyy')}"></td>
            <td th:text="${app.employerComment}"></td>
            <td th:text="${app.reviewerNote}"></td>
            <td>
                <a th:href="@{/employer/applicants/{id}(id=${app.applicationId})}"
                   class="btn btn-sm btn-primary">
                    View
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- BULK MODAL -->
    <div class="modal fade" id="bulkModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle"></h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p id="selectedCount"></p>
                    <label class="form-label">Employer Comment</label>
                    <textarea id="bulkComment"
                              class="form-control"
                              rows="3"
                              required></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="button"
                            class="btn btn-primary"
                            id="confirmBulkBtn">
                        Confirm
                    </button>
                </div>

            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<!-- YOUR BULK JS -->
<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {

    const jobId = /*[[${jobId}]]*/ 0;
    const checkboxes = document.querySelectorAll('.appCheckbox');
    const selectAll = document.getElementById('selectAll');
    const bulkShortlist = document.getElementById('bulkShortlistBtn');
    const bulkReject = document.getElementById('bulkRejectBtn');
    const confirmBulkBtn = document.getElementById('confirmBulkBtn');
    const modal = new bootstrap.Modal(document.getElementById('bulkModal'));

    let selectedAction = "";

    function toggleBulkButtons() {
        const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
        bulkShortlist.disabled = !anyChecked;
        bulkReject.disabled = !anyChecked;
    }

    selectAll.addEventListener('change', function () {
        checkboxes.forEach(cb => cb.checked = this.checked);
        toggleBulkButtons();
    });

    checkboxes.forEach(cb => {
        cb.addEventListener('change', toggleBulkButtons);
    });

    bulkShortlist.addEventListener('click', function () {
        selectedAction = "shortlist";
        openModal("Confirm Bulk Shortlist");
    });

    bulkReject.addEventListener('click', function () {
        selectedAction = "reject";
        openModal("Confirm Bulk Reject");
    });

    function openModal(title) {
        const selectedIds = getSelectedIds();
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('selectedCount').innerText =
            "Selected Applicants: " + selectedIds.length;
        modal.show();
    }

    function getSelectedIds() {
        return Array.from(checkboxes)
            .filter(cb => cb.checked)
            .map(cb => parseInt(cb.value));
    }

    confirmBulkBtn.addEventListener('click', function () {

        const selectedIds = getSelectedIds();
        const comment = document.getElementById('bulkComment').value;

        fetch(`/employer/jobs/${jobId}/applicants/bulk-${selectedAction}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                applicationIds: selectedIds,
                comment: comment
            })
        })
        .then(res => res.text())
        .then(data => {
            alert(data);
            location.reload();
        });
    });

});
</script>

</body>
</html>
