<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Edit Company Profile</title>
</head>

<body>

<div class="container mt-4">

    <!-- PAGE HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold text-primary">
            <i class="bi bi-building-gear me-2"></i>Edit Company Profile
        </h2>

        <a th:href="@{/employers/profile}"
           class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>

    </div>


    <div class="card shadow border-0">

        <div class="card-header bg-light">
            <h5 class="mb-0 text-secondary">
                <i class="bi bi-pencil-square me-2"></i>Company Information
            </h5>
        </div>

        <div class="card-body p-4">

            <form th:action="@{/employers/profile}"
                  th:object="${employerRequest}"
                  method="post">

                <!-- GLOBAL ERRORS -->
                <div th:if="${#fields.hasErrors('*')}"
                     class="alert alert-danger">
                    <ul class="mb-0">
                        <li th:each="err : ${#fields.errors('*')}"
                            th:text="${err}"></li>
                    </ul>
                </div>


                <div class="row g-3">

                    <!-- Company Name -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-building text-primary me-1"></i>
                            Company Name *
                        </label>

                        <input type="text"
                               th:field="*{companyName}"
                               th:classappend="${#fields.hasErrors('companyName')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{companyName}"></div>

                    </div>


                    <!-- Industry -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-diagram-3 text-primary me-1"></i>
                            Industry *
                        </label>

                        <input type="text"
                               th:field="*{industry}"
                               th:classappend="${#fields.hasErrors('industry')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{industry}"></div>

                    </div>

                </div>



                <div class="row g-3 mt-1">

                    <!-- Company Size -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-people text-primary me-1"></i>
                            Company Size *
                        </label>

                        <input type="text"
                               th:field="*{companySize}"
                               th:classappend="${#fields.hasErrors('companySize')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{companySize}"></div>

                    </div>



                    <!-- Location -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-geo-alt text-primary me-1"></i>
                            Location *
                        </label>

                        <input type="text"
                               th:field="*{location}"
                               th:classappend="${#fields.hasErrors('location')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{location}"></div>

                    </div>

                </div>



                <!-- Website -->
                <div class="mt-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-globe text-primary me-1"></i>
                        Company Website
                    </label>

                    <input type="url"
                           th:field="*{website}"
                           th:classappend="${#fields.hasErrors('website')} ? ' is-invalid' : ''"
                           class="form-control form-control-lg">

                    <div class="invalid-feedback"
                         th:errors="*{website}"></div>

                </div>



                <!-- Description -->
                <div class="mt-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-card-text text-primary me-1"></i>
                        Company Description *
                    </label>

                    <textarea rows="5"
                              th:field="*{description}"
                              th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"
                              class="form-control"></textarea>

                    <div class="invalid-feedback"
                         th:errors="*{description}"></div>

                </div>



                <!-- BUTTONS -->
                <div class="d-flex justify-content-end gap-3 mt-4">

                    <a th:href="@{/employers/profile}"
                       class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-primary px-4">

                        <i class="bi bi-check-circle me-1"></i>
                        Save Changes

                    </button>

                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
