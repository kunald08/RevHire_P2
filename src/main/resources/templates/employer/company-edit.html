<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Edit Company Profile</title>
</head>

<body>

<h2 class="fw-bold mb-4">
    <i class="bi bi-building-gear me-2"></i>Edit Company Profile
</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form th:action="@{/employers/profile}"
              th:object="${employerRequest}"
              method="post">

            <!-- GLOBAL ERRORS -->
            <div th:if="${#fields.hasErrors('*')}"
                 class="alert alert-danger">
                <ul class="mb-0">
                    <li th:each="err : ${#fields.errors('*')}"
                        th:text="${err}"></li>
                </ul>
            </div>

            <div class="row">

                <!-- Company Name -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company Name *</label>
                    <input type="text"
                           th:field="*{companyName}"
                           th:classappend="${#fields.hasErrors('companyName')} ? ' is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback"
                         th:errors="*{companyName}"></div>
                </div>

                <!-- Industry -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Industry *</label>
                    <input type="text"
                           th:field="*{industry}"
                           th:classappend="${#fields.hasErrors('industry')} ? ' is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback"
                         th:errors="*{industry}"></div>
                </div>

            </div>

            <div class="row">

                <!-- Company Size -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company Size *</label>
                    <input type="text"
                           th:field="*{companySize}"
                           th:classappend="${#fields.hasErrors('companySize')} ? ' is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback"
                         th:errors="*{companySize}"></div>
                </div>

                <!-- Location -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Location *</label>
                    <input type="text"
                           th:field="*{location}"
                           th:classappend="${#fields.hasErrors('location')} ? ' is-invalid' : ''"
                           class="form-control">
                    <div class="invalid-feedback"
                         th:errors="*{location}"></div>
                </div>

            </div>

            <!-- Website -->
            <div class="mb-3">
                <label class="form-label">Website</label>
                <input type="url"
                       th:field="*{website}"
                       th:classappend="${#fields.hasErrors('website')} ? ' is-invalid' : ''"
                       class="form-control">
                <div class="invalid-feedback"
                     th:errors="*{website}"></div>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description *</label>
                <textarea rows="4"
                          th:field="*{description}"
                          th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"
                          class="form-control"></textarea>
                <div class="invalid-feedback"
                     th:errors="*{description}"></div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/employers/profile}"
                   class="btn btn-outline-secondary">
                    Cancel
                </a>

                <button type="submit"
                        class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>Save Changes
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
