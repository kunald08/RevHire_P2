<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/employer-layout :: employer-layout(~{::section})}">
<head>
    <title th:text="${isEdit ? 'RevHire — Edit Company Profile' : 'RevHire — Create Company Profile'}">RevHire — Company Profile</title>
</head>
<body>
<section>
    <style>
        /* ── Cover ── */
        .form-cover {
            height: 160px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
            border-radius: 0 0 28px 28px;
            position: relative;
        }
        .form-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            border-radius: 0 0 28px 28px;
        }

        /* ── Form Card ── */
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            background: #fff;
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }

        .form-title-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            flex-shrink: 0;
        }

        /* ── Inputs ── */
        .form-group-custom label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-group-custom label i {
            margin-right: 0.35rem;
            color: #7c3aed;
        }
        .form-control-custom, .form-select-custom {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fafbfc;
        }
        .form-control-custom:focus, .form-select-custom:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
            background: #fff;
        }
        .form-control-custom.is-invalid, .form-select-custom.is-invalid {
            border-color: #ef4444;
        }
        .invalid-feedback { font-size: 0.8rem; }

        /* ── Section Divider ── */
        .form-section {
            margin-bottom: 2rem;
        }
        .form-section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #9ca3af;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f3f4f6;
        }

        /* ── Submit ── */
        .btn-submit {
            border-radius: 12px;
            padding: 0.75rem 2.5rem;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79,70,229,0.35);
            color: #fff;
        }
        .btn-cancel {
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #6b7280;
            border: 2px solid #e5e7eb;
            background: #fff;
            transition: all 0.3s ease;
        }
        .btn-cancel:hover {
            border-color: #d1d5db;
            background: #f9fafb;
            color: #374151;
        }

        /* ── Char Counter ── */
        .char-counter {
            font-size: 0.75rem;
            color: #9ca3af;
            text-align: right;
            margin-top: 0.25rem;
        }
    </style>

    <!-- Cover -->
    <div class="form-cover"></div>

    <div style="max-width: 820px; margin: 0 auto;">

        <!-- Error Alert -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3"
             style="border-radius:12px;border:none;" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="form-card p-4 p-md-5">

            <!-- Title -->
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="form-title-icon">
                    <i th:class="${isEdit ? 'bi bi-pencil-square' : 'bi bi-building-add'}"></i>
                </div>
                <div>
                    <h4 class="fw-bold mb-0" th:text="${isEdit ? 'Edit Company Profile' : 'Create Company Profile'}">Company Profile</h4>
                    <p class="text-muted mb-0" style="font-size:0.9rem;" th:text="${isEdit ? 'Update your company information' : 'Set up your company presence on RevHire'}">Subtitle</p>
                </div>
            </div>

            <!-- Form -->
            <form th:action="@{/employers/profile}" th:object="${employerRequest}" method="post" novalidate>

                <!-- Basic Information -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="bi bi-building me-1"></i> Basic Information
                    </div>

                    <div class="row g-3">
                        <!-- Company Name -->
                        <div class="col-12 form-group-custom">
                            <label for="companyName"><i class="bi bi-building"></i> Company Name <span class="text-danger">*</span></label>
                            <input type="text" id="companyName" th:field="*{companyName}"
                                   th:classappend="${#fields.hasErrors('companyName') ? 'is-invalid' : ''}"
                                   class="form-control form-control-custom"
                                   placeholder="e.g. TCS, Infosys, Google" maxlength="100">
                            <div th:if="${#fields.hasErrors('companyName')}" class="invalid-feedback"
                                 th:errors="*{companyName}">Error</div>
                        </div>

                        <!-- Industry -->
                        <div class="col-md-6 form-group-custom">
                            <label for="industry"><i class="bi bi-briefcase"></i> Industry <span class="text-danger">*</span></label>
                            <input type="text" id="industry" th:field="*{industry}" list="industryList"
                                   th:classappend="${#fields.hasErrors('industry') ? 'is-invalid' : ''}"
                                   class="form-control form-control-custom"
                                   placeholder="e.g. Information Technology" maxlength="100">
                            <datalist id="industryList">
                                <option value="Information Technology">
                                <option value="Software Development">
                                <option value="Financial Services">
                                <option value="Healthcare">
                                <option value="Education">
                                <option value="E-Commerce">
                                <option value="Manufacturing">
                                <option value="Consulting">
                                <option value="Telecommunications">
                                <option value="Media & Entertainment">
                                <option value="Automotive">
                                <option value="Real Estate">
                                <option value="Retail">
                                <option value="Logistics & Supply Chain">
                            </datalist>
                            <div th:if="${#fields.hasErrors('industry')}" class="invalid-feedback"
                                 th:errors="*{industry}">Error</div>
                        </div>

                        <!-- Company Size -->
                        <div class="col-md-6 form-group-custom">
                            <label for="companySize"><i class="bi bi-people"></i> Company Size <span class="text-danger">*</span></label>
                            <select id="companySize" th:field="*{companySize}"
                                    th:classappend="${#fields.hasErrors('companySize') ? 'is-invalid' : ''}"
                                    class="form-select form-select-custom">
                                <option value="">Select company size</option>
                                <option value="1-10">1-10 employees</option>
                                <option value="11-50">11-50 employees</option>
                                <option value="51-200">51-200 employees</option>
                                <option value="201-500">201-500 employees</option>
                                <option value="501-1000">501-1,000 employees</option>
                                <option value="1001-5000">1,001-5,000 employees</option>
                                <option value="5001-10000">5,001-10,000 employees</option>
                                <option value="10001+">10,001+ employees</option>
                            </select>
                            <div th:if="${#fields.hasErrors('companySize')}" class="invalid-feedback"
                                 th:errors="*{companySize}">Error</div>
                        </div>
                    </div>
                </div>

                <!-- Location & Web -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="bi bi-geo-alt me-1"></i> Location &amp; Web
                    </div>

                    <div class="row g-3">
                        <!-- Location -->
                        <div class="col-md-6 form-group-custom">
                            <label for="location"><i class="bi bi-geo-alt"></i> Headquarters Location <span class="text-danger">*</span></label>
                            <input type="text" id="location" th:field="*{location}"
                                   th:classappend="${#fields.hasErrors('location') ? 'is-invalid' : ''}"
                                   class="form-control form-control-custom"
                                   placeholder="e.g. Hyderabad, India" maxlength="150">
                            <div th:if="${#fields.hasErrors('location')}" class="invalid-feedback"
                                 th:errors="*{location}">Error</div>
                        </div>

                        <!-- Website -->
                        <div class="col-md-6 form-group-custom">
                            <label for="website"><i class="bi bi-globe"></i> Website</label>
                            <input type="url" id="website" th:field="*{website}"
                                   th:classappend="${#fields.hasErrors('website') ? 'is-invalid' : ''}"
                                   class="form-control form-control-custom"
                                   placeholder="https://www.example.com">
                            <div th:if="${#fields.hasErrors('website')}" class="invalid-feedback"
                                 th:errors="*{website}">Error</div>
                        </div>
                    </div>
                </div>

                <!-- About -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="bi bi-card-text me-1"></i> About Your Company
                    </div>

                    <div class="form-group-custom">
                        <label for="description"><i class="bi bi-card-text"></i> Description <span class="text-danger">*</span></label>
                        <textarea id="description" th:field="*{description}" rows="6"
                                  th:classappend="${#fields.hasErrors('description') ? 'is-invalid' : ''}"
                                  class="form-control form-control-custom"
                                  placeholder="Tell candidates about your company—its mission, culture, and what makes it a great place to work..."
                                  maxlength="5000"
                                  oninput="document.getElementById('descCount').textContent = this.value.length + ' / 5,000'"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="invalid-feedback"
                             th:errors="*{description}">Error</div>
                        <div class="char-counter" id="descCount">0 / 5,000</div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex flex-wrap gap-3 pt-2">
                    <button type="submit" class="btn btn-submit">
                        <i th:class="${isEdit ? 'bi bi-check-lg me-1' : 'bi bi-building-add me-1'}"></i>
                        <span th:text="${isEdit ? 'Save Changes' : 'Create Profile'}">Save</span>
                    </button>
                    <a th:href="${isEdit ? '/employers/profile' : '/employer/dashboard'}" class="btn btn-cancel">
                        <i class="bi bi-x-lg me-1"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Initialise char counter on page load -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var desc = document.getElementById('description');
            var counter = document.getElementById('descCount');
            if (desc && counter) {
                counter.textContent = desc.value.length + ' / 5,000';
            }
        });
    </script>
</section>
</body>
</html>
