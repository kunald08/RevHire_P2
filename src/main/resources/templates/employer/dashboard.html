<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Employer Dashboard</title>
</head>

<body>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">
        <i class="bi bi-speedometer2 me-2"></i>Employer Dashboard
    </h2>

    <a th:href="@{/jobs/create}" class="btn btn-primary">
        <i class="bi bi-plus-circle me-1"></i>Post New Job
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">

        <h5 class="mb-3">Your Job Postings</h5>

        <ul class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="job : ${jobs}">

                <a th:href="@{/jobs/{id}(id=${job.id})}"
                   th:text="${job.title}"
                   class="fw-semibold text-decoration-none">
                </a>

                <span th:if="${job.status.name() == 'ACTIVE'}"
                      class="badge bg-success">ACTIVE</span>

                <span th:if="${job.status.name() == 'CLOSED'}"
                      class="badge bg-warning text-dark">CLOSED</span>

                <span th:if="${job.status.name() == 'FILLED'}"
                      class="badge bg-danger">FILLED</span>

            </li>

            <li class="list-group-item text-center"
                th:if="${#lists.isEmpty(jobs)}">
                No job postings yet.
            </li>
        </ul>

    </div>
</div>

</body>
</html>
