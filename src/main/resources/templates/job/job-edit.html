<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Edit Job</title>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold text-primary">
            <i class="bi bi-pencil-square me-2"></i>Edit Job
        </h2>

        <a th:href="@{/jobs/{id}(id=${jobId})}"
           class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to Job
        </a>

    </div>


    <div class="card shadow border-0">

        <div class="card-header bg-light">
            <h5 class="mb-0 text-secondary">
                <i class="bi bi-briefcase me-2"></i>Job Information
            </h5>
        </div>

        <div class="card-body p-4">

            <form th:action="@{/jobs/{id}/update(id=${jobId})}"
                  th:object="${jobRequest}"
                  method="post">

                <!-- GLOBAL ERRORS -->
                <div th:if="${#fields.hasErrors('*')}"
                     class="alert alert-danger">
                    <ul class="mb-0">
                        <li th:each="err : ${#fields.errors('*')}"
                            th:text="${err}"></li>
                    </ul>
                </div>


                <div class="row g-3">

                    <!-- Job Title -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-card-heading text-primary me-1"></i>
                            Job Title *
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{title}"></div>

                    </div>


                    <!-- Location -->
                    <div class="col-md-6">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-geo-alt text-primary me-1"></i>
                            Location *
                        </label>

                        <input type="text"
                               th:field="*{location}"
                               th:classappend="${#fields.hasErrors('location')} ? ' is-invalid' : ''"
                               class="form-control form-control-lg">

                        <div class="invalid-feedback"
                             th:errors="*{location}"></div>

                    </div>

                </div>


                <!-- Description -->
                <div class="mt-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-card-text text-primary me-1"></i>
                        Job Description *
                    </label>

                    <textarea rows="4"
                              th:field="*{description}"
                              th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"
                              class="form-control"></textarea>

                    <div class="invalid-feedback"
                         th:errors="*{description}"></div>

                </div>



                <div class="row g-3 mt-2">

                    <!-- Salary Min -->
                    <div class="col-md-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-currency-rupee text-primary me-1"></i>
                            Min Salary *
                        </label>

                        <input type="number"
                               step="0.01"
                               th:field="*{salaryMin}"
                               th:classappend="${#fields.hasErrors('salaryMin')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{salaryMin}"></div>

                    </div>


                    <!-- Salary Max -->
                    <div class="col-md-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-currency-rupee text-primary me-1"></i>
                            Max Salary *
                        </label>

                        <input type="number"
                               step="0.01"
                               th:field="*{salaryMax}"
                               th:classappend="${#fields.hasErrors('salaryMax')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{salaryMax}"></div>

                    </div>


                    <!-- Experience Min -->
                    <div class="col-md-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-clock text-primary me-1"></i>
                            Min Experience *
                        </label>

                        <input type="number"
                               th:field="*{experienceMin}"
                               th:classappend="${#fields.hasErrors('experienceMin')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{experienceMin}"></div>

                    </div>


                    <!-- Experience Max -->
                    <div class="col-md-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-clock-history text-primary me-1"></i>
                            Max Experience *
                        </label>

                        <input type="number"
                               th:field="*{experienceMax}"
                               th:classappend="${#fields.hasErrors('experienceMax')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{experienceMax}"></div>

                    </div>

                </div>



                <div class="row g-3 mt-2">

                    <!-- Job Type -->
                    <div class="col-md-4">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-briefcase text-primary me-1"></i>
                            Job Type *
                        </label>

                        <select th:field="*{jobType}"
                                th:classappend="${#fields.hasErrors('jobType')} ? ' is-invalid' : ''"
                                class="form-select">

                            <option value="">Select Type</option>
                            <option value="FULL_TIME">Full Time</option>
                            <option value="PART_TIME">Part Time</option>
                            <option value="CONTRACT">Contract</option>
                            <option value="INTERNSHIP">Internship</option>
                            <option value="REMOTE">Remote</option>

                        </select>

                        <div class="invalid-feedback"
                             th:errors="*{jobType}"></div>

                    </div>


                    <!-- Deadline -->
                    <div class="col-md-4">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-calendar-event text-primary me-1"></i>
                            Deadline *
                        </label>

                        <input type="date"
                               th:field="*{deadline}"
                               th:classappend="${#fields.hasErrors('deadline')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{deadline}"></div>

                    </div>


                    <!-- Openings -->
                    <div class="col-md-4">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-people text-primary me-1"></i>
                            Number of Openings *
                        </label>

                        <input type="number"
                               th:field="*{numOpenings}"
                               th:classappend="${#fields.hasErrors('numOpenings')} ? ' is-invalid' : ''"
                               class="form-control">

                        <div class="invalid-feedback"
                             th:errors="*{numOpenings}"></div>

                    </div>

                </div>



                <!-- Skills -->
                <div class="mt-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-tools text-primary me-1"></i>
                        Required Skills *
                    </label>

                    <input type="text"
                           th:field="*{requiredSkills}"
                           th:classappend="${#fields.hasErrors('requiredSkills')} ? ' is-invalid' : ''"
                           class="form-control">

                    <div class="invalid-feedback"
                         th:errors="*{requiredSkills}"></div>

                </div>



                <!-- Education -->
                <div class="mt-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-mortarboard text-primary me-1"></i>
                        Education Requirement *
                    </label>

                    <input type="text"
                           th:field="*{educationReq}"
                           th:classappend="${#fields.hasErrors('educationReq')} ? ' is-invalid' : ''"
                           class="form-control">

                    <div class="invalid-feedback"
                         th:errors="*{educationReq}"></div>

                </div>



                <!-- BUTTON -->
                <div class="d-flex justify-content-end mt-4">

                    <button type="submit"
                            class="btn btn-primary px-4">

                        <i class="bi bi-check-circle me-1"></i>
                        Update Job

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
