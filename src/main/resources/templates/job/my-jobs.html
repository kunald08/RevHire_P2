<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<head>
    <title>My Jobs</title>
</head>
<body>

<div class="container mt-4">
	
	<!-- SUCCESS MESSAGE -->
	<div th:if="${success}" 
	     class="alert alert-success alert-dismissible fade show">
	    <span th:text="${success}"></span>
	    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-list-task me-2"></i>My Job Postings
        </h2>

        <!-- RIGHT SIDE BUTTONS -->
		<!-- RIGHT SIDE BUTTONS -->
		<div class="d-flex gap-2">

		    <a th:href="@{/jobs/create}" class="btn btn-primary">
		        <i class="bi bi-plus-circle me-1"></i>Post New Job
		    </a>

		    <a th:href="@{/employers/profile}" class="btn btn-outline-dark">
		        <i class="bi bi-building me-1"></i>Employer Profile
		    </a>

		</div>
    </div>

    <!-- Jobs Card -->
    <div class="card shadow-sm">
        <div class="card-body">

            <div th:if="${#lists.isEmpty(jobs)}" class="text-center py-4">
                <p class="text-muted">You have not posted any jobs yet.</p>
            </div>

            <div th:unless="${#lists.isEmpty(jobs)}">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Deadline</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td>
                                <a th:href="@{/jobs/{id}(id=${job.id})}"
                                   class="fw-semibold text-decoration-none"
                                   th:text="${job.title}">
                                </a>
                            </td>

                            <!-- Status Badge -->
                            <td>
                                <span class="badge"
                                      th:classappend="
                                          ${job.status.name() == 'ACTIVE'} ? ' bg-success' :
                                          (${job.status.name() == 'CLOSED'} ? ' bg-warning text-dark' :
                                          ' bg-danger')"
                                      th:text="${job.status}">
                                </span>
                            </td>

                            <td th:text="${job.deadline}"></td>

                            <!-- Action Buttons -->
                            <td class="text-end">
                                <a th:href="@{/jobs/{id}/edit(id=${job.id})}"
                                   class="btn btn-sm btn-outline-secondary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <form th:action="@{/jobs/{id}/delete(id=${job.id})}"
                                      method="post"
                                      style="display:inline;">
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Are you sure you want to delete this job?');">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
