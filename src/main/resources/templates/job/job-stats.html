<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">

<head>
    <title>Job Statistics</title>

    <style>
        .summary-card {
            height: 130px;
        }

        .chart-card {
            height: 420px;
        }

        .chart-area {
            height: 330px;
            position: relative;
        }

        .no-data-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #6c757d;
            font-size: 18px;
            text-align: center;
        }

        canvas {
            height: 100% !important;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- Back Button -->
    <div class="mb-3">
        <a th:href="@{/jobs/{id}(id=${stats.jobId})}"
           class="btn btn-outline-secondary btn-sm">
            ← Back to Job
        </a>
    </div>

    <h2 class="fw-bold mb-4">📊 Job Statistics</h2>

    <!-- SUMMARY CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-3 mb-3">
            <div class="card shadow-sm bg-light summary-card">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6>Total Views</h6>
                    <h3 class="fw-bold text-primary"
                        th:text="${stats.viewCount} ?: 0">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow-sm bg-light summary-card">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6>Total Applications</h6>
                    <h3 class="fw-bold text-success"
                        th:text="${stats.totalApplications} ?: 0">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow-sm bg-light summary-card">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6>Job Status</h6>
                    <h5 th:text="${stats.jobStatus}">ACTIVE</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow-sm bg-light summary-card">
                <div class="card-body d-flex flex-column justify-content-center">
                    <h6>Applied</h6>
                    <h3 th:text="${stats.appliedCount} ?: 0">0</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- CHART SECTION -->
    <div class="row">

        <!-- Application Distribution -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm chart-card">
                <div class="card-body">
                    <h5 class="mb-3">Application Distribution</h5>

                    <div class="chart-area">
                        <canvas id="pieChart"></canvas>

                        <div id="noDataMessage"
                             class="no-data-message"
                             style="display:none;">
                            No applications yet.
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Views vs Applications -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm chart-card">
                <div class="card-body">
                    <h5 class="mb-3">Views vs Applications</h5>

                    <div class="chart-area">
                        <canvas id="barChart"></canvas>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {

    const applied = [[${stats.appliedCount} ?: 0]];
    const underReview = [[${stats.underReviewCount} ?: 0]];
    const shortlisted = [[${stats.shortlistedCount} ?: 0]];
    const rejected = [[${stats.rejectedCount} ?: 0]];
    const withdrawn = [[${stats.withdrawnCount} ?: 0]];
    const totalApplications = [[${stats.totalApplications} ?: 0]];
    const viewCount = [[${stats.viewCount} ?: 0]];

    /* PIE CHART */

    if (totalApplications > 0) {

        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: ['Applied', 'Under Review', 'Shortlisted', 'Rejected', 'Withdrawn'],
                datasets: [{
                    data: [applied, underReview, shortlisted, rejected, withdrawn],
                    backgroundColor: [
                        '#0d6efd',
                        '#ffc107',
                        '#198754',
                        '#dc3545',
                        '#6c757d'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

    } else {
        document.getElementById('pieChart').style.display = "none";
        document.getElementById('noDataMessage').style.display = "block";
    }

    /* BAR CHART */

    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: ['Views', 'Applications'],
            datasets: [{
                label: 'Count',
                data: [viewCount, totalApplications],
                backgroundColor: ['#0d6efd', '#198754']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

});
</script>

</body>
</html>
