<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevHire — Login</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-sm p-4">
				    <div class="text-center mb-4">
				        <i class="bi bi-person-circle text-primary display-4"></i>
				        <h2 class="fw-bold mt-2">Welcome Back</h2>
				        <p class="text-muted">Login to your RevHire account</p>
				    </div>
				
				    <div th:if="${param.success}" class="alert alert-success py-2 small">
				        <i class="bi bi-check-circle me-1"></i> Registration successful! Please login.
				    </div>
				
				    <div th:if="${param.info}" class="alert alert-info py-2 small shadow-sm">
				        <i class="bi bi-info-circle me-1"></i>
				        <span th:text="${param.info}"></span>
				    </div>
				
				    <div th:if="${param.pwUpdated}" class="alert alert-success py-2 small alert-dismissible fade show" role="alert">
				        <i class="bi bi-shield-check me-1"></i> 
				        <span th:text="${param.pwUpdated}" class="small"></span>
				        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				    </div>
				
				    <div th:if="${param.error}" class="alert alert-danger py-2 small">
				        <i class="bi bi-exclamation-triangle me-2"></i>Invalid email or password.
				    </div>
				    <div th:if="${param.logout}" class="alert alert-info py-2 small">
				        You have been logged out.
				    </div>
				
				    <form th:action="@{/login}" method="post" id="passwordLoginForm">
					    <div class="mb-3">
					        <label class="form-label">Email Address</label>
					        <input type="email" name="username" class="form-control" placeholder="name@example.com" required autofocus>
					    </div>
					    
					    <div id="passwordFieldSection">
					        <div class="mb-2">
					            <label class="form-label">Password</label>
					            <div class="input-group">
					                <input type="password" name="password" id="passwordInput" class="form-control border-end-0" placeholder="Enter password">
					                <span class="input-group-text bg-white border-start-0" id="togglePassword" style="cursor: pointer;">
					                    <i class="bi bi-eye text-muted" id="toggleIcon"></i>
					                </span>
					            </div>
					        </div>
					        <div class="text-end mb-3">
					            <a href="javascript:void(0)" onclick="toggleLoginMethod('otp')" class="small text-decoration-none">Login with OTP instead?</a>
					        </div>
					    </div>
					
					    <div id="otpLinkSection" style="display: none;">
					        <div class="text-center mb-4">
					            <button type="button" onclick="requestLoginOtp()" class="btn btn-outline-primary w-100">
					                <i class="bi bi-envelope-paper me-2"></i>Send Login OTP to Email
					            </button>
					            <a href="javascript:void(0)" onclick="toggleLoginMethod('password')" class="small text-decoration-none d-block mt-2">Back to Password</a>
					        </div>
					    </div>
					
					    <button type="submit" id="submitBtn" class="btn btn-primary w-100 btn-lg shadow-sm">Login</button>
					</form>
				    
				    <hr class="my-4">
				    
				    <p class="text-center mb-0 text-muted small">
				        New to RevHire? <a th:href="@{/auth/register}" class="text-decoration-none fw-bold">Create an account</a>
				    </p>
				</div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
	<script>
	        document.addEventListener('DOMContentLoaded', function() {
	            const toggleBtn = document.getElementById('togglePassword');
	            const passwordInput = document.getElementById('passwordInput');
	            const toggleIcon = document.getElementById('toggleIcon');

	            if(toggleBtn) {
	                toggleBtn.addEventListener('click', function() {
	                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
	                    passwordInput.setAttribute('type', type);
	                    toggleIcon.classList.toggle('bi-eye');
	                    toggleIcon.classList.toggle('bi-eye-slash');
	                });
	            }
	        });
			
			function toggleLoginMethod(method) {
			    const pwSection = document.getElementById('passwordFieldSection');
			    const otpSection = document.getElementById('otpLinkSection');
			    const pwInput = document.getElementById('passwordInput');
			    const submitBtn = document.getElementById('submitBtn');

			    if (method === 'otp') {
			        pwSection.style.display = 'none';
			        otpSection.style.display = 'block';
			        submitBtn.style.display = 'none'; // Hide submit because user must click "Send OTP" first
			        pwInput.required = false;
			    } else {
			        pwSection.style.display = 'block';
			        otpSection.style.display = 'none';
			        submitBtn.style.display = 'block';
			        pwInput.required = true;
			    }
			}

			async function requestLoginOtp() {
			    const email = document.querySelector('input[name="username"]').value;
			    if(!email) { alert("Please enter your email first."); return; }

			    // Redirect to a controller endpoint that sends login OTP
			    window.location.href = `/auth/login/otp-request?email=${encodeURIComponent(email)}`;
			}
	    </script>
</body>
</html>
