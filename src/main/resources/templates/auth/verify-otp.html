<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Email | RevHire</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <i class="bi bi-envelope-check text-primary display-4"></i>
                    <h2 class="fw-bold mt-3">Check your email</h2>
                    <p class="text-muted">We sent a 6-digit code to <br><strong th:text="${email}"></strong></p>
                    
                    <div class="mb-3">
                        <span id="timer-badge" class="badge rounded-pill bg-warning text-dark px-3 py-2">
                            <i class="bi bi-clock-history me-1"></i>
                            Expires in: <span id="timer">05:00</span>
                        </span>
                    </div>
                    
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/auth/verify}" method="post" id="otpForm">
                        <input type="hidden" name="email" th:value="${email}" />
                        <div class="mb-4">
                            <input type="text" name="otp" id="otpInput" class="form-control form-control-lg text-center fw-bold" 
                                   placeholder="000000" maxlength="6" required autofocus>
                        </div>
                        <button type="submit" id="verifyBtn" class="btn btn-primary w-100 btn-lg">Verify & Register</button>
                    </form>
                    
                    <div id="resendSection" class="mt-3 d-none">
                        <p class="small text-muted">Didn't get the code? <a th:href="@{/auth/register}" class="text-decoration-none">Try registering again</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        // 1. Get initial time from controller (300 seconds = 5 mins)
        let timeLeft = /*[[${secondsRemaining != null ? secondsRemaining : 300}]]*/ 300;
        const timerElement = document.getElementById('timer');
        const timerBadge = document.getElementById('timer-badge');
        const verifyBtn = document.getElementById('verifyBtn');
        const otpInput = document.getElementById('otpInput');
        const resendSection = document.getElementById('resendSection');

        const countdown = setInterval(function() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            // Formatting MM:SS
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.innerHTML = minutes + ":" + seconds;

            // Change badge color to red when less than 1 minute remains
            if (timeLeft <= 60) {
                timerBadge.classList.replace('bg-warning', 'bg-danger');
                timerBadge.classList.add('text-white');
            }

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerHTML = "EXPIRED";
                
                // Disable form to prevent invalid submissions
                verifyBtn.disabled = true;
                otpInput.disabled = true;
                
                // Show resend/restart option
                resendSection.classList.remove('d-none');
            }
            timeLeft -= 1;
        }, 1000);
    </script>
</body>
</html>
