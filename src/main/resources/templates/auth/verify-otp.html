<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP | RevHire</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <style>
        .btn-danger:disabled {
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        #resendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <i class="bi bi-shield-lock text-primary display-4"></i>
                    
                    <h2 class="fw-bold mt-3" th:text="${isLogin ? 'Login Verification' : 'Check your email'}">Check your email</h2>
                    <p class="text-muted">We sent a 6-digit code to <br><strong th:text="${email}"></strong></p>
                    
                    <div class="mb-3">
                        <span id="timer-badge" class="badge rounded-pill bg-warning text-dark px-3 py-2">
                            <i class="bi bi-clock-history me-1"></i>
                            Expires in: <span id="timer">05:00</span>
                        </span>
                    </div>
                    
                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
                    <div th:if="${resendSuccess}" class="alert alert-success py-2 small">New code sent! Please check your inbox.</div>

                    <form th:action="${isLogin ? '/auth/verify-login' : '/auth/verify'}" method="post" id="otpForm">
                        <input type="hidden" name="email" th:value="${email}" />
                        <div class="mb-4">
                            <input type="text" name="otp" id="otpInput" class="form-control form-control-lg text-center fw-bold" 
                                   placeholder="000000" maxlength="6" required autofocus>
                        </div>
                        <button type="submit" id="verifyBtn" class="btn btn-primary w-100 btn-lg">
                            <span th:text="${isLogin ? 'Verify & Login' : 'Verify & Register'}">Verify</span>
                        </button>
                    </form>
                    
                    <div id="resendSection" class="mt-4">
                        <p class="small text-muted mb-2">Didn't get the code or it expired?</p>
                        
                        <form th:action="@{/auth/resend-otp}" method="post" id="resendForm" class="d-inline">
                            <input type="hidden" name="email" th:value="${email}">
                            <input type="hidden" name="type" th:value="${isLogin ? 'login' : 'register'}">
                            <button type="submit" id="resendBtn" class="btn btn-outline-secondary btn-sm" disabled>
                                <i class="bi bi-arrow-clockwise"></i> Resend Verification Code
                            </button>
                        </form>
                        
                        <div id="attemptDisplay" class="text-muted small mt-2">
                            <span id="attemptsLeft" class="fw-bold" th:text="${3 - (resendCount != null ? resendCount : 0)}">3</span> attempts remaining
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    
    <script th:inline="javascript">
        const secondsRemaining = /*[[${secondsRemaining != null ? secondsRemaining : 0}]]*/ 0;
        const expiryTimestamp = Date.now() + (secondsRemaining * 1000);
        
        const resendBtn = document.getElementById('resendBtn');
        const resendForm = document.getElementById('resendForm');
        const timerElement = document.getElementById('timer');
        const verifyBtn = document.getElementById('verifyBtn');
        const otpInput = document.getElementById('otpInput');

        // FLAG: Prevent timer from re-enabling button if we are currently "Processing" a click
        let isProcessing = false;

        function updateTimer() {
            if (isProcessing) return; // Don't update text if spinner is showing

            const now = Date.now();
            const distance = expiryTimestamp - now;
            const timeLeft = Math.ceil(distance / 1000);

            if (timeLeft <= 0) {
                timerElement.innerHTML = "EXPIRED";
                timerElement.parentElement.classList.replace('bg-warning', 'bg-danger');
                timerElement.parentElement.classList.add('text-white');
                
                verifyBtn.disabled = true;
                otpInput.disabled = true;
                
                // ACTIVATE RESEND: Only active when counter hits 0
                resendBtn.disabled = false;
                resendBtn.innerHTML = `<i class="bi bi-arrow-clockwise"></i> Resend Verification Code`;
                return;
            }

            // Update Countdown Text
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerElement.innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // KEEP DISABLED: Button stays disabled while timer > 0
            resendBtn.disabled = true;
            resendBtn.innerHTML = `<i class="bi bi-lock-fill"></i> Resend available in ${timerElement.innerHTML}`;
        }

        // Handle the Spinner on Form Submit
        resendForm.addEventListener('submit', function() {
            isProcessing = true;
            resendBtn.disabled = true;
            resendBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Sending Email...
            `;
        });

        const timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
