<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password | RevHire</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
                        <h2 class="h4 fw-bold mt-2">Forgot Password?</h2>
                        <p class="text-muted small">Enter your email and we'll send you a link to reset your password.</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                    <form th:action="@{/auth/forgot-password}" method="post" id="forgotForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control" 
                                   placeholder="name@example.com" required>
                        </div>
                        
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100">
                            <span id="btnText">Send Reset Link</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/auth/login}" class="text-decoration-none small">
                            <i class="bi bi-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('btnSpinner');
            const text = document.getElementById('btnText');
            
            btn.disabled = true;
            text.textContent = "Sending...";
            spinner.classList.remove('d-none');
        });
    </script>
</body>
</html>
