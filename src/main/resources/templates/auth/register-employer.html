<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevHire — Employer Sign Up</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm p-4 border-top border-success border-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-building text-success display-4"></i>
                        <h2 class="fw-bold mt-2">Employer Registration</h2>
                    </div>

					<div th:if="${errorMessage}" class="alert alert-danger shadow-sm border-0 mb-4 d-flex align-items-center">
					    <i class="bi bi-exclamation-triangle-fill me-2"></i>
					    <span th:text="${errorMessage}"></span>
					</div>

                    <form th:action="@{/auth/register}" th:object="${user}" method="post">
                        <input type="hidden" name="role" value="EMPLOYER" />

                        <div class="mb-3">
                            <label class="form-label">Company Name / HR Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. TechCorp Solutions" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Official Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="hr@company.com" required>
                        </div>
						<div class="mb-3">
						    <label for="password" class="form-label">Password</label>
						    <input type="password" id="password" name="password" class="form-control" 
						           onkeyup="checkPasswordStrength(this.value)" required>
						    
						    <div class="progress mt-2" style="height: 5px;">
						        <div id="strength-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
						    </div>
						    <small id="strength-text" class="text-muted">Enter a password</small>
						</div>
						                        <div class="mb-3">
                            <label class="form-label">Company Phone</label>
                            <input type="text" th:field="*{phone}" class="form-control" placeholder="+91..." required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm">Register as Employer</button>
                    </form>
                    
                    <p class="text-center mt-4 mb-0 text-muted">
                        Hiring for a firm? <a th:href="@{/auth/login}" class="text-decoration-none">Login to Dashboard</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
	<script th:src="@{/js/auth/auth.js}"></script>
</body>
</html>
