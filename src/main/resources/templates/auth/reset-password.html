<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password | RevHire</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm p-4">
                    <h2 class="h4 fw-bold mb-3 text-center">Set New Password</h2>
                    <p class="text-muted text-center small mb-4">Please create a strong password that you haven't used before.</p>

                    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                    <form th:action="@{/auth/reset-password}" method="post" id="resetForm">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Password</label>
                            <input type="password" name="newPassword" class="form-control" 
                                   placeholder="Minimum 8 characters" required>
                            <div class="form-text small">
                                Must include: A-Z, a-z, 0-9, and @#$%^&+=!
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirm New Password</label>
                            <input type="password" name="confirmPassword" class="form-control" 
                                   placeholder="Repeat your new password" required>
                        </div>

                        <button type="submit" id="resetBtn" class="btn btn-success w-100">
                            <span id="resetText">Reset Password</span>
                            <span id="resetSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function() {
            const btn = document.getElementById('resetBtn');
            const spinner = document.getElementById('resetSpinner');
            const text = document.getElementById('resetText');
            
            btn.disabled = true;
            text.textContent = "Updating Password...";
            spinner.classList.remove('d-none');
        });
    </script>
</body>
</html>
