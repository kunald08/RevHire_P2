<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevHire — Seeker Sign Up</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-badge text-primary display-4"></i>
                        <h2 class="fw-bold mt-2">Seeker Registration</h2>
                    </div>

					<div th:if="${errorMessage}" class="alert alert-danger shadow-sm border-0 mb-4 d-flex align-items-center">
					    <i class="bi bi-exclamation-triangle-fill me-2"></i>
					    <span th:text="${errorMessage}"></span>
					</div>

                    <form th:action="@{/auth/register}" th:object="${user}" method="post">
                        <input type="hidden" name="role" value="SEEKER" />

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="name@example.com" required>
                        </div>
						<div class="mb-3">
						    <label class="form-label">Password</label>
						    <div class="input-group">
						        <input type="password" th:field="*{password}" id="passwordInput" 
						               class="form-control" placeholder="Create a strong password" required>
						        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
						            <i class="bi bi-eye" id="eyeIcon"></i>
						        </button>
						    </div>
						</div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" th:field="*{location}" class="form-control" placeholder="e.g. Chennai, India">
                        </div>

						<button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm" id="regBtn">
						    <span id="btnText">Create Seeker Account</span>
						    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
						</button>
                    </form>
                    
                    <p class="text-center mt-4 mb-0 text-muted">
                        Already have an account? <a th:href="@{/auth/login}" class="text-decoration-none">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
	<script th:src="@{/js/auth/auth.js}"></script>
</body>
</html>
