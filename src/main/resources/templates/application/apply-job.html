<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .resume-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .resume-card:hover {
            background-color: #f8f9fa;
            border-color: #0d6efd;
        }
        .resume-card.selected {
            background-color: #e7f1ff;
            border-color: #0d6efd;
            border-width: 2px;
        }
        .resume-card input[type="radio"] {
            margin-right: 10px;
        }
        .file-upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f8f9fa;
            transition: all 0.2s;
            cursor: pointer;
        }
        .file-upload-area:hover {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }
        .file-upload-area.dragover {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }
        #fileInput {
            display: none;
        }
        .file-name {
            margin-top: 10px;
            font-weight: 500;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar}"></div>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-send"></i> Apply for Job</h4>
                    </div>
                    <div class="card-body">
                        
                        <div th:if="${param.success}" class="alert alert-success">
                            <i class="bi bi-check-circle"></i> <span th:text="${param.success[0]}">Success</span>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${param.error[0]}">Error</span>
                        </div>
                        
                        <form th:action="@{/applications/apply/{jobId}(jobId=${jobId})}" 
                              th:object="${applicationRequest}" 
                              method="post" 
                              enctype="multipart/form-data"
                              id="applicationForm">
                            
                            <input type="hidden" name="jobId" th:value="${jobId}" />
                            
                            <!-- Cover Letter -->
                            <div class="mb-4">
                                <label for="coverLetter" class="form-label fw-bold">
                                    <i class="bi bi-file-text"></i> Cover Letter <span class="text-muted">(Optional)</span>
                                </label>
                                <textarea class="form-control" id="coverLetter" name="coverLetter" 
                                          rows="5" placeholder="Tell the employer why you're the best candidate for this position..."></textarea>
                                <small class="text-muted">Maximum 5000 characters</small>
                            </div>
                            
                            <!-- Resume Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-file-pdf"></i> Resume <span class="text-danger">*</span>
                                </label>
                                
                                <!-- Option 1: Use Existing Resume -->
                                <div class="mb-3">
                                    <h6 class="text-primary">Use Existing Resume</h6>
                                    
                                    <div th:if="${userResumes != null and not userResumes.isEmpty()}">
                                        <div th:each="resume, iterStat : ${userResumes}" class="resume-card" th:classappend="${iterStat.first} ? 'selected' : ''">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="resumeId" 
                                                       th:id="'resume' + ${resume.id}" 
                                                       th:value="${resume.id}"
                                                       th:checked="${iterStat.first}">
                                                <label class="form-check-label" th:for="'resume' + ${resume.id}">
                                                    <i class="bi bi-file-earmark-pdf text-danger"></i>
                                                    <strong th:text="${resume.fileName != null ? resume.fileName : 'Unnamed Resume'}">My Resume.pdf</strong>
                                                    <br>
                                                    <small class="text-muted">
                                                        Uploaded: <span th:text="${#temporals.format(resume.createdAt, 'MMM dd, yyyy')}">Jan 15, 2024</span>
                                                        • Size: <span th:text="${resume.fileSize != null ? (resume.fileSize / 1024) + ' KB' : 'Unknown'}">278 KB</span>
                                                    </small>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div th:if="${userResumes == null or userResumes.isEmpty()}" class="alert alert-info">
                                        <i class="bi bi-info-circle"></i> You don't have any existing resumes. Please upload a new one.
                                    </div>
                                </div>
                                
                                <!-- Divider -->
                                <div class="text-center my-3">
                                    <span class="bg-light px-3 py-1 rounded-pill text-muted small">OR</span>
                                </div>
                                
                                <!-- Option 2: Upload New Resume - FIXED VERSION -->
                                <div class="mb-3">
                                    <h6 class="text-success">Upload New Resume</h6>
                                    
                                    <div class="file-upload-area" id="fileUploadArea">
                                        <i class="bi bi-cloud-upload" style="font-size: 2rem; color: #0d6efd;"></i>
                                        <p class="mb-1">Click to browse or drag and drop</p>
                                        <small class="text-muted">PDF, DOCX (Max: 2MB)</small>
                                        
                                        <!-- Simple, direct file input -->
                                        <div class="mt-3">
                                            <input type="file" id="fileInput" name="newResume" 
                                                   accept=".pdf,.docx,.doc" style="display: none;" />
                                            <button type="button" class="btn btn-outline-primary" id="browseBtn">
                                                <i class="bi bi-folder2-open"></i> Browse Files
                                            </button>
                                            <span id="fileNameDisplay" class="ms-2 text-muted"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Submit Buttons -->
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/jobs/search/results}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Back to Search
                                </a>
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <i class="bi bi-send"></i> Submit Application
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get elements
        const fileInput = document.getElementById('fileInput');
        const browseBtn = document.getElementById('browseBtn');
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const resumeRadios = document.querySelectorAll('input[name="resumeId"]');
        const resumeCards = document.querySelectorAll('.resume-card');

        // Browse button click - triggers file input
        browseBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            fileInput.click();
        });

        // File upload area click - also triggers file input
        fileUploadArea.addEventListener('click', function(e) {
            // Don't trigger if clicking on the button (button has its own handler)
            if (e.target !== browseBtn && !browseBtn.contains(e.target)) {
                fileInput.click();
            }
        });

        // When file is selected
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const file = this.files[0];
                fileNameDisplay.textContent = file.name;
                
                // Clear any selected resume radio
                resumeRadios.forEach(radio => {
                    radio.checked = false;
                });
                resumeCards.forEach(card => {
                    card.classList.remove('selected');
                });
                
                console.log('File selected:', file.name, 'Size:', file.size);
            } else {
                fileNameDisplay.textContent = '';
            }
        });

        // When existing resume is selected
        resumeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) {
                    // Clear file input
                    fileInput.value = '';
                    fileNameDisplay.textContent = '';
                    
                    // Update selected card styling
                    resumeCards.forEach(card => card.classList.remove('selected'));
                    const card = this.closest('.resume-card');
                    if (card) card.classList.add('selected');
                }
            });
        });

        // Drag and drop functionality
        fileUploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });

        fileUploadArea.addEventListener('dragleave', function() {
            this.classList.remove('dragover');
        });

        fileUploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // Set the file to the input
                fileInput.files = files;
                fileNameDisplay.textContent = files[0].name;
                
                // Clear any selected resume radio
                resumeRadios.forEach(radio => radio.checked = false);
                resumeCards.forEach(card => card.classList.remove('selected'));
                
                // Trigger change event manually
                const event = new Event('change', { bubbles: true });
                fileInput.dispatchEvent(event);
            }
        });

        // Form validation
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            const hasExistingResume = Array.from(resumeRadios).some(radio => radio.checked);
            const hasNewResume = fileInput.files.length > 0;
            
            if (!hasExistingResume && !hasNewResume) {
                e.preventDefault();
                alert('Please select an existing resume or upload a new one.');
                return false;
            }
            
            // If uploading new file, log it
            if (hasNewResume) {
                console.log('Submitting with new file:', fileInput.files[0].name);
            } else {
                console.log('Submitting with existing resume ID');
            }
        });
    </script>
</body>
</html>
