<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div th:replace="~{fragments/navbar}"></div>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-send"></i> Apply for Job</h4>
                    </div>
                    <div class="card-body">
                        
                        <div th:if="${param.success}" class="alert alert-success">
                            <i class="bi bi-check-circle"></i> <span th:text="${param.success[0]}">Success</span>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${param.error[0]}">Error</span>
                        </div>
                        
                        <form th:action="@{/applications/apply/{jobId}(jobId=${jobId})}" 
                              th:object="${applicationRequest}" 
                              method="post" 
                              enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{jobId}" />
                            
                            <div class="mb-3">
                                <label for="coverLetter" class="form-label">
                                    <i class="bi bi-file-text"></i> Cover Letter <span class="text-muted">(Optional)</span>
                                </label>
                                <textarea class="form-control" id="coverLetter" th:field="*{coverLetter}" 
                                          rows="5" placeholder="Tell the employer why you're the best candidate..."></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-file-pdf"></i> Resume
                                </label>
                                
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" name="resumeOption" id="existingResume" value="existing" checked>
                                    <label class="form-check-label" for="existingResume">
                                        Use existing resume
                                    </label>
                                </div>
                                <div class="ms-4 mb-3" id="existingResumeSection">
                                    <select class="form-select" th:field="*{resumeId}">
                                        <option value="">-- Select a resume --</option>
                                        <option value="1">My Resume.pdf</option>
                                    </select>
                                </div>
                                
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" name="resumeOption" id="newResume" value="new">
                                    <label class="form-check-label" for="newResume">
                                        Upload new resume
                                    </label>
                                </div>
                                <div class="ms-4 mb-3 d-none" id="newResumeSection">
                                    <input type="file" class="form-control" id="newResume" name="newResume" 
                                           accept=".pdf,.docx">
                                    <small class="text-muted">PDF or DOCX (Max: 2MB)</small>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/jobs/search/results}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Back to Search
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send"></i> Submit Application
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('input[name="resumeOption"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'existing') {
                    document.getElementById('existingResumeSection').classList.remove('d-none');
                    document.getElementById('newResumeSection').classList.add('d-none');
                } else {
                    document.getElementById('existingResumeSection').classList.add('d-none');
                    document.getElementById('newResumeSection').classList.remove('d-none');
                }
            });
        });
    </script>
</body>
</html>
