<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .resume-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .resume-card:hover {
            background-color: #f8f9fa;
            border-color: #0d6efd;
        }
        .resume-card.selected {
            background-color: #e7f1ff;
            border-color: #0d6efd;
            border-width: 2px;
        }
        .resume-card input[type="radio"] {
            margin-right: 10px;
        }
        .file-upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f8f9fa;
            transition: all 0.2s;
        }
        .file-upload-area:hover {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }
        .file-upload-area.dragover {
            border-color: #0d6efd;
            background-color: #e7f1ff;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar}"></div>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-send"></i> Apply for Job</h4>
                    </div>
                    <div class="card-body">
                        
                        <!-- Success/Error Messages -->
                        <div th:if="${param.success}" class="alert alert-success">
                            <i class="bi bi-check-circle"></i> <span th:text="${param.success[0]}">Success</span>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${param.error[0]}">Error</span>
                        </div>
                        
                        <form th:action="@{/applications/apply/{jobId}(jobId=${jobId})}" 
                              th:object="${applicationRequest}" 
                              method="post" 
                              enctype="multipart/form-data"
                              id="applicationForm">
                            
                            <input type="hidden" name="jobId" th:value="${jobId}" />
                            
                            <!-- Cover Letter -->
                            <div class="mb-4">
                                <label for="coverLetter" class="form-label fw-bold">
                                    <i class="bi bi-file-text"></i> Cover Letter <span class="text-muted">(Optional)</span>
                                </label>
                                <textarea class="form-control" id="coverLetter" name="coverLetter" 
                                          rows="5" placeholder="Tell the employer why you're the best candidate for this position..."></textarea>
                                <small class="text-muted">Maximum 5000 characters</small>
                            </div>
                            
                            <!-- Resume Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">
                                    <i class="bi bi-file-pdf"></i> Resume <span class="text-danger">*</span>
                                </label>
                                
                                <!-- Option 1: Use Existing Resume -->
                                <div class="mb-3">
                                    <h6 class="text-primary">Use Existing Resume</h6>
                                    
                                    <!-- Display existing resumes -->
                                    <div th:if="${userResumes != null and not userResumes.isEmpty()}">
                                        <div th:each="resume, iterStat : ${userResumes}" class="resume-card" th:classappend="${iterStat.first} ? 'selected' : ''">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="resumeId" 
                                                       th:id="'resume' + ${resume.id}" 
                                                       th:value="${resume.id}"
                                                       th:checked="${iterStat.first}">
                                                <label class="form-check-label" th:for="'resume' + ${resume.id}">
                                                    <i class="bi bi-file-earmark-pdf text-danger"></i>
                                                    <strong th:text="${resume.fileName}">My Resume.pdf</strong>
                                                    <br>
                                                    <small class="text-muted">
                                                        Uploaded: <span th:text="${#temporals.format(resume.createdAt, 'MMM dd, yyyy')}">Jan 15, 2024</span>
                                                        • Size: <span th:text="${resume.fileSize != null ? (resume.fileSize / 1024) + ' KB' : 'Unknown'}">1.2 MB</span>
                                                    </small>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- No resumes message -->
                                    <div th:if="${userResumes == null or userResumes.isEmpty()}" class="alert alert-info">
                                        <i class="bi bi-info-circle"></i> You don't have any existing resumes. Please upload a new one.
                                    </div>
                                </div>
                                
                                <!-- Divider -->
                                <div class="text-center my-3">
                                    <span class="bg-light px-3 py-1 rounded-pill text-muted small">OR</span>
                                </div>
                                
                                <!-- Option 2: Upload New Resume -->
                                <div class="mb-3">
                                    <h6 class="text-success">Upload New Resume</h6>
                                    
                                    <div class="file-upload-area" id="fileUploadArea">
                                        <i class="bi bi-cloud-upload" style="font-size: 2rem; color: #0d6efd;"></i>
                                        <p class="mb-1">Drag and drop your resume here or click to browse</p>
                                        <small class="text-muted">Supported formats: PDF, DOCX (Max: 2MB)</small>
                                        
                                        <div class="mt-3">
                                            <input type="file" class="form-control" id="newResume" name="newResume" 
                                                   accept=".pdf,.docx,.doc" style="display: none;">
                                            <button type="button" class="btn btn-outline-primary" onclick="document.getElementById('newResume').click()">
                                                <i class="bi bi-folder2-open"></i> Choose File
                                            </button>
                                            <span id="selectedFileName" class="ms-2 text-muted"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Submit Buttons -->
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/jobs/search/results}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Back to Search
                                </a>
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <i class="bi bi-send"></i> Submit Application
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Handle file selection
        document.getElementById('newResume').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : '';
            document.getElementById('selectedFileName').textContent = fileName;
            
            // Clear any selected resumeId when uploading new file
            document.querySelectorAll('input[name="resumeId"]').forEach(radio => {
                radio.checked = false;
            });
        });
        
        // Handle existing resume selection
        document.querySelectorAll('input[name="resumeId"]').forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) {
                    // Clear file input when selecting existing resume
                    document.getElementById('newResume').value = '';
                    document.getElementById('selectedFileName').textContent = '';
                }
            });
        });
        
        // File upload area click
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('newResume');
        
        fileUploadArea.addEventListener('click', function(e) {
            // Don't trigger if clicking on button
            if (e.target.tagName !== 'BUTTON') {
                fileInput.click();
            }
        });
        
        fileUploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        
        fileUploadArea.addEventListener('dragleave', function() {
            this.classList.remove('dragover');
        });
        
        fileUploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                document.getElementById('selectedFileName').textContent = files[0].name;
                
                // Clear any selected resumeId
                document.querySelectorAll('input[name="resumeId"]').forEach(radio => {
                    radio.checked = false;
                });
            }
        });
        
        // Form validation
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            const hasExistingResume = document.querySelector('input[name="resumeId"]:checked') !== null;
            const hasNewResume = document.getElementById('newResume').files.length > 0;
            
            if (!hasExistingResume && !hasNewResume) {
                e.preventDefault();
                alert('Please select an existing resume or upload a new one.');
            }
        });
    </script>
</body>
</html>
