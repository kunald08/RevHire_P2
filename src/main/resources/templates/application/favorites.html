<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevHire — My Favorites</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <style>
        .fav-hero {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
            border-radius: 0 0 28px 28px;
            padding: 2.5rem 0 4rem;
            color: #fff;
            position: relative;
        }
        .fav-hero::after {
            content: '';
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            border-radius: 0 0 28px 28px; pointer-events: none;
        }
        .fav-hero .hero-content { position: relative; z-index: 2; }

        .fav-card {
            border: none; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .fav-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(79,70,229,0.12); }

        .fav-card .card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .type-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .type-FULL_TIME { background: #dbeafe; color: #1e40af; }
        .type-PART_TIME { background: #fef3c7; color: #92400e; }
        .type-CONTRACT { background: #fce7f3; color: #9d174d; }
        .type-INTERNSHIP { background: #dcfce7; color: #166534; }
        .type-REMOTE { background: #ede9fe; color: #5b21b6; }

        .remove-btn {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; background: #fef2f2; color: #ef4444;
            transition: all 0.2s; cursor: pointer;
        }
        .remove-btn:hover { background: #ef4444; color: #fff; transform: scale(1.1); }

        .meta-item {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.82rem; color: #6b7280;
        }
        .meta-item i { font-size: 0.9rem; }

        .skill-tag {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 500;
            background: #f3f4f6; color: #4b5563;
        }

        .deadline-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .deadline-ok { background: #dcfce7; color: #166534; }
        .deadline-soon { background: #fef3c7; color: #92400e; }
        .deadline-expired { background: #fef2f2; color: #991b1b; }

        .empty-state {
            text-align: center; padding: 4rem 1rem;
        }
        .empty-icon {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #fce7f3, #ede9fe);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; font-size: 2.5rem; color: #a855f7;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- ══ HERO ══ -->
    <section class="fav-hero">
        <div class="container hero-content">
            <h2 class="fw-bold mb-1"><i class="bi bi-heart-fill me-2"></i> My Favorites</h2>
            <p class="mb-0 opacity-75" th:if="${favorites != null}"
               th:text="${favorites.totalElements} + ' saved job' + (${favorites.totalElements != 1} ? 's' : '')">
                12 saved jobs
            </p>
        </div>
    </section>

    <div class="container mb-5" style="margin-top: -2.5rem; position: relative; z-index: 5;">

        <!-- Flash Messages -->
        <div th:if="${param.successMessage}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm mb-4" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i> <span th:text="${param.successMessage[0]}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${param.errorMessage[0]}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- ══ EMPTY STATE ══ -->
        <div th:if="${favorites == null or favorites.content.isEmpty()}" class="empty-state">
            <div class="empty-icon"><i class="bi bi-heart"></i></div>
            <h4 class="fw-bold mb-2">No Favorites Yet</h4>
            <p class="text-muted mb-4">Browse jobs and tap the heart icon to save them here for easy access later.</p>
            <a th:href="@{/jobs/search}" class="btn btn-primary btn-lg px-4 rounded-pill">
                <i class="bi bi-search me-1"></i> Browse Jobs
            </a>
        </div>

        <!-- ══ FAVORITES GRID ══ -->
        <div th:unless="${favorites == null or favorites.content.isEmpty()}" class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="fav : ${favorites.content}">
                <div class="card fav-card h-100">
                    <div class="card-body p-4">
                        <!-- Top Row: Type + Remove -->
                        <div class="card-top mb-3">
                            <span class="type-badge" th:classappend="'type-' + ${fav.jobType}" th:text="${fav.jobType?.toString()?.replace('_', ' ')}">Full Time</span>
                            <form th:action="@{/favorites/{jobId}/remove(jobId=${fav.jobId})}" method="post" style="margin:0;">
                                <button type="submit" class="remove-btn" title="Remove from favorites"
                                        onclick="return confirm('Remove this job from favorites?');">
                                    <i class="bi bi-heart-fill"></i>
                                </button>
                            </form>
                        </div>

                        <!-- Title + Company -->
                        <h6 class="fw-bold mb-1">
                            <a th:href="@{/jobs/{id}(id=${fav.jobId})}" class="text-decoration-none text-dark"
                               th:text="${fav.jobTitle}">Software Engineer</a>
                        </h6>
                        <div class="meta-item mb-3" th:if="${fav.companyName != null}">
                            <i class="bi bi-building"></i>
                            <span th:text="${fav.companyName}">TechCorp</span>
                        </div>

                        <!-- Meta -->
                        <div class="d-flex flex-wrap gap-3 mb-3">
                            <span class="meta-item" th:if="${fav.location != null}">
                                <i class="bi bi-geo-alt-fill text-primary"></i>
                                <span th:text="${fav.location}">New York</span>
                            </span>
                            <span class="meta-item" th:if="${fav.salaryDisplay != null}">
                                <i class="bi bi-currency-dollar text-success"></i>
                                <span th:text="${fav.salaryDisplay}">$80k - $120k</span>
                            </span>
                            <span class="meta-item" th:if="${fav.experienceDisplay != null}">
                                <i class="bi bi-bar-chart text-info"></i>
                                <span th:text="${fav.experienceDisplay}">2 - 5 yrs</span>
                            </span>
                        </div>

                        <!-- Skills -->
                        <div th:if="${fav.requiredSkills != null and !fav.requiredSkills.isEmpty()}" class="d-flex flex-wrap gap-1 mb-3">
                            <span class="skill-tag" th:each="skill, stat : ${fav.requiredSkills}" th:if="${stat.index < 4}" th:text="${skill}">Java</span>
                            <span class="skill-tag" th:if="${fav.requiredSkills.size() > 4}" th:text="'+' + (${fav.requiredSkills.size()} - 4) + ' more'">+2 more</span>
                        </div>

                        <!-- Deadline -->
                        <div th:if="${fav.daysRemaining != null}" class="mb-2">
                            <span class="deadline-chip"
                                  th:classappend="${fav.daysRemaining < 0 ? 'deadline-expired' : (fav.daysRemaining <= 7 ? 'deadline-soon' : 'deadline-ok')}"
                                  th:text="${fav.daysRemaining < 0 ? 'Expired' : (fav.daysRemaining == 0 ? 'Last day!' : fav.daysRemaining + ' days left')}">
                                5 days left
                            </span>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="card-footer bg-white border-top-0 px-4 pb-4 pt-0">
                        <div class="d-flex gap-2">
                            <a th:href="@{/jobs/{id}(id=${fav.jobId})}" class="btn btn-outline-primary btn-sm flex-grow-1 rounded-pill">
                                <i class="bi bi-eye me-1"></i> Details
                            </a>
                            <a th:href="@{/applications/apply/{jobId}(jobId=${fav.jobId})}" class="btn btn-primary btn-sm flex-grow-1 rounded-pill">
                                <i class="bi bi-send me-1"></i> Apply
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ══ PAGINATION ══ -->
        <nav th:if="${favorites != null and favorites.totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${favorites.first} ? 'disabled'">
                    <a class="page-link rounded-pill me-1" th:href="@{/favorites(page=${favorites.number - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, favorites.totalPages - 1)}"
                    th:classappend="${favorites.number == i} ? 'active'">
                    <a class="page-link rounded-pill me-1" th:href="@{/favorites(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${favorites.last} ? 'disabled'">
                    <a class="page-link rounded-pill" th:href="@{/favorites(page=${favorites.number + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Summary Bar -->
        <div th:unless="${favorites == null or favorites.content.isEmpty()}" class="text-center mt-4">
            <div class="d-inline-flex align-items-center gap-2 px-4 py-2 rounded-pill" style="background:#f3f4f6;">
                <i class="bi bi-heart-fill text-danger"></i>
                <span class="text-muted">
                    <strong th:text="${favorites.totalElements}">0</strong> saved job<span th:unless="${favorites.totalElements == 1}">s</span>
                    &middot;
                    <a th:href="@{/jobs/search}" class="text-decoration-none fw-semibold">Discover more <i class="bi bi-arrow-right"></i></a>
                </span>
            </div>
        </div>
    </div>


    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</html>
