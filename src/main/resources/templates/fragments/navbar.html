<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-briefcase-fill me-2"></i>RevHire
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/jobs/search}">Find Jobs</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <!-- Show when NOT logged in -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/register}">
                        <i class="bi bi-person-plus me-1"></i>Register
                    </a>
                </li>

                <!-- Show when logged in as SEEKER -->
                <li class="nav-item" sec:authorize="hasAuthority('SEEKER')">
                    <a class="nav-link" th:href="@{/profile}">
                        <i class="bi bi-person me-1"></i>My Profile
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SEEKER')">
                    <a class="nav-link" th:href="@{/applications}">
                        <i class="bi bi-file-earmark-text me-1"></i>My Applications
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SEEKER')">
                    <a class="nav-link" th:href="@{/favorites}">
                        <i class="bi bi-heart me-1"></i>Saved Jobs
                    </a>
                </li>

                <!-- Show when logged in as EMPLOYER -->
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/jobs/my}">
                        <i class="bi bi-list-task me-1"></i>My Jobs
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/jobs/create}">
                        <i class="bi bi-plus-circle me-1"></i>Post Job
                    </a>
                </li>
				<!-- My account -->
				<li class="nav-item" sec:authorize="isAuthenticated()">
			        <a class="nav-link" th:href="@{/auth/me}">
			            <i class="bi bi-person-circle me-1"></i>My Account
			        </a>
				</li>
                <!-- Notifications — visible to all authenticated users -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link position-relative" th:href="@{/notifications}">
                        <i class="bi bi-bell me-1"></i>Notifications
                        <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle" 
                              id="notif-count" style="display:none;"></span>
                    </a>
                </li>

                <!-- Logout -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/logout}">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
