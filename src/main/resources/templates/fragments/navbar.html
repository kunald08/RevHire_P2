<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>

<style>
.navbar {
    height: 70px;
}

/* Subtle bold and grayish highlight for auth links */
.auth-link-text {
    font-weight: 500 !important;
    transition: all 0.2s ease-in-out;
    border-radius: 4px;
    color: rgba(255, 255, 255, 0.75) !important;
}

.auth-link-text:hover {
    background-color: rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
}

/* Dropdown styling */
.dropdown-menu {
    min-width: 220px;
    position: absolute !important;
}

/* Align icon + text in dropdown */
.dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
}

.dropdown-item:hover {
    background-color: #f8f9fa;
}
</style>

</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold d-flex align-items-center me-4" th:href="@{/}">
            <i class="bi bi-briefcase-fill me-2 fs-3 text-primary"></i>
            <span>RevHire</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            
            <ul class="navbar-nav me-auto align-items-center">
                <li class="nav-item" sec:authorize="hasAuthority('EMPLOYER')">
                    <a class="nav-link px-3 fw-bold text-info" th:href="@{/employer/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('EMPLOYER')">
                    <a class="nav-link px-3" th:href="@{/jobs/my}">My Jobs</a>
                </li>
                <li class="nav-item" sec:authorize="!hasAuthority('EMPLOYER')">
                    <a class="nav-link px-3" th:href="@{/jobs/search}">Find Jobs</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto align-items-center">
                
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link px-3 auth-link-text" th:href="@{/auth/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link px-3 auth-link-text" th:href="@{/auth/register}">Register</a>
                </li>

                <li class="nav-item me-2" sec:authorize="isAuthenticated()">
                    <a class="nav-link p-2 auth-link-text" th:href="@{/notifications}">
                        <i class="bi bi-bell fs-5"></i>
                    </a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center bg-secondary bg-opacity-25 rounded-pill px-3"
                       href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5 me-2"></i>
                        <span class="d-none d-md-inline" sec:authentication="name">User</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
                        <li class="dropdown-header text-uppercase small fw-bold">Account</li>
                        <li sec:authorize="hasAuthority('EMPLOYER')">
                            <a class="dropdown-item" th:href="@{/jobs/create}"><i class="bi bi-plus-circle"></i> Post Job</a>
                        </li>
                        <li sec:authorize="hasAuthority('SEEKER')">
                            <a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person"></i> My Profile</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/auth/me}"><i class="bi bi-gear"></i> Settings</a></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/auth/logout}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>



</body>
</html>
