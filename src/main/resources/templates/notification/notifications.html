<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-bell me-2"></i>Notifications
                <span class="badge bg-danger ms-2" th:if="${unreadCount > 0}" th:text="${unreadCount}">0</span>
            </h2>
            <form th:action="@{/notifications/read-all}" method="post" th:if="${unreadCount > 0}">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-check-all me-1"></i>Mark All as Read
                </button>
            </form>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
            <i class="bi bi-bell-slash display-3 text-muted"></i>
            <p class="text-muted mt-3">No notifications yet.</p>
        </div>

        <!-- Notification List -->
        <div class="list-group" th:unless="${#lists.isEmpty(notifications)}">
            <div th:each="notif : ${notifications}" 
                 class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
                 th:classappend="${!notif.isRead} ? 'list-group-item-light fw-semibold' : ''">
                
                <div class="ms-2 me-auto">
                    <div class="d-flex align-items-center mb-1">
                        <!-- Icon based on type -->
                        <i class="bi me-2" 
                           th:classappend="${notif.type.name() == 'APPLICATION_UPDATE'} ? 'bi-file-earmark-text text-primary' : 
                                            (${notif.type.name() == 'JOB_RECOMMENDATION'} ? 'bi-briefcase text-success' : 'bi-info-circle text-secondary')"></i>
                        <span th:text="${notif.message}">Notification message</span>
                    </div>
                    <small class="text-muted" th:text="${#temporals.format(notif.createdAt, 'MMM dd, yyyy hh:mm a')}">
                        Feb 27, 2026
                    </small>
                </div>

                <div class="d-flex gap-1">
                    <!-- View link if available -->
                    <a th:if="${notif.link}" th:href="${notif.link}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye"></i>
                    </a>
                    <!-- Mark as read -->
                    <form th:unless="${notif.isRead}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-success" title="Mark as read">
                            <i class="bi bi-check"></i>
                        </button>
                    </form>
                    <!-- Delete -->
                    <form th:action="@{/notifications/{id}/delete(id=${notif.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
