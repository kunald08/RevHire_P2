<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .notification-item {
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        .notification-item:hover {
            background-color: #f8f9fa;
        }
        .notification-item.unread {
            background-color: #e8f4fd;
            border-left-color: #0d6efd;
        }
        .notification-item.type-APPLICATION_UPDATE {
            border-left-color: #0d6efd;
        }
        .notification-item.type-JOB_RECOMMENDATION {
            border-left-color: #198754;
        }
        .notification-item.type-SYSTEM {
            border-left-color: #6c757d;
        }
        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .notif-icon.app-update { background-color: #cfe2ff; color: #0d6efd; }
        .notif-icon.job-rec { background-color: #d1e7dd; color: #198754; }
        .notif-icon.system { background-color: #e2e3e5; color: #6c757d; }
        .notif-time {
            font-size: 0.8rem;
            color: #6c757d;
            white-space: nowrap;
        }
        .notification-actions .btn {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
        .empty-state {
            padding: 4rem 2rem;
        }
        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
        }
        .filter-tabs .nav-link {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .filter-tabs .nav-link.active {
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4 mb-5">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">
                <i class="bi bi-bell me-2"></i>Notifications
                <span class="badge bg-danger ms-2" th:if="${unreadCount > 0}" th:text="${unreadCount}">0</span>
            </h3>
            <div class="d-flex gap-2" th:if="${!#lists.isEmpty(notifications)}">
                <form th:action="@{/notifications/read-all}" method="post" th:if="${unreadCount > 0}">
                    <button type="submit" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-check-all me-1"></i>Mark All Read
                    </button>
                </form>
                <form th:action="@{/notifications/delete-all}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm" 
                            onclick="return confirm('Are you sure you want to delete all notifications?')">
                        <i class="bi bi-trash me-1"></i>Clear All
                    </button>
                </form>
            </div>
        </div>

        <hr class="mt-0">

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(notifications)}" class="text-center empty-state">
            <i class="bi bi-bell-slash"></i>
            <h5 class="text-muted mt-3">No notifications yet</h5>
            <p class="text-muted">You'll be notified here when there are updates on your applications or new job matches.</p>
        </div>

        <!-- Notification List -->
        <div class="list-group shadow-sm" th:unless="${#lists.isEmpty(notifications)}">
            <div th:each="notif : ${notifications}" 
                 class="list-group-item notification-item d-flex align-items-start gap-3 py-3"
                 th:classappend="${!notif.isRead ? 'unread ' : ''} + 'type-' + ${notif.type.name()}">

                <!-- Type Icon -->
                <div class="notif-icon" 
                     th:classappend="${notif.type.name() == 'APPLICATION_UPDATE'} ? 'app-update' : 
                                      (${notif.type.name() == 'JOB_RECOMMENDATION'} ? 'job-rec' : 'system')">
                    <i class="bi" 
                       th:classappend="${notif.type.name() == 'APPLICATION_UPDATE'} ? 'bi-file-earmark-check' : 
                                        (${notif.type.name() == 'JOB_RECOMMENDATION'} ? 'bi-briefcase' : 'bi-info-circle')"></i>
                </div>

                <!-- Message Content -->
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge mb-1"
                                  th:classappend="${notif.type.name() == 'APPLICATION_UPDATE'} ? 'bg-primary-subtle text-primary' : 
                                                    (${notif.type.name() == 'JOB_RECOMMENDATION'} ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary')"
                                  th:text="${notif.type.name() == 'APPLICATION_UPDATE'} ? 'Application Update' : 
                                            (${notif.type.name() == 'JOB_RECOMMENDATION'} ? 'Job Recommendation' : 'System')">Type</span>
                        </div>
                        <span class="notif-time" th:text="${#temporals.format(notif.createdAt, 'MMM dd, yyyy hh:mm a')}">
                            Feb 27, 2026
                        </span>
                    </div>
                    <p class="mb-1 mt-1" th:classappend="${!notif.isRead} ? 'fw-semibold' : ''" 
                       th:text="${notif.message}">Notification message goes here</p>
                </div>

                <!-- Actions -->
                <div class="notification-actions d-flex flex-column gap-1">
                    <!-- View link -->
                    <a th:if="${notif.link}" th:href="${notif.link}" 
                       class="btn btn-sm btn-outline-primary" title="View Details">
                        <i class="bi bi-eye"></i>
                    </a>
                    <!-- Mark as read -->
                    <form th:unless="${notif.isRead}" th:action="@{/notifications/{id}/read(id=${notif.id})}" method="post" class="mb-0">
                        <button type="submit" class="btn btn-sm btn-outline-success w-100" title="Mark as read">
                            <i class="bi bi-check"></i>
                        </button>
                    </form>
                    <!-- Delete -->
                    <form th:action="@{/notifications/{id}/delete(id=${notif.id})}" method="post" class="mb-0">
                        <button type="submit" class="btn btn-sm btn-outline-danger w-100" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
