# ========================
# SERVER
# ========================
server.port=8080
spring.profiles.active=local

# ========================
# DATASOURCE (MySQL)
# Each developer sets their own credentials via environment variables
# or in application-local.properties (git-ignored).
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/revhire?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# THYMELEAF
# ========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# ========================
# FILE UPLOAD (Resume - max 2MB)
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ========================
# FILE UPLOAD DIRECTORY
# ========================
app.upload.dir=uploads

# ========================
# LOGGING (Log4J2 - see log4j2.xml)
# ========================
logging.config=classpath:log4j2.xml

# ========================
# SESSION
# ========================
server.servlet.session.timeout=30m

# ========================
# EMAIL (SMTP Configuration)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Use your actual email address
spring.mail.username=${MAIL_USERNAME}
# Use a Google 'App Password', NOT your regular Gmail password
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
