<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sidebar" class="bg-light border-end vh-100 p-3" style="width: 250px;">
    <h5 class="text-muted mb-3">Dashboard</h5>
    <ul class="nav flex-column">
        <!-- Employer Sidebar -->
        <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
            <a class="nav-link" th:href="@{/employer/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Overview
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
            <a class="nav-link" th:href="@{/jobs/my}">
                <i class="bi bi-list-task me-2"></i>My Job Postings
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
            <a class="nav-link" th:href="@{/jobs/create}">
                <i class="bi bi-plus-circle me-2"></i>Post a Job
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
            <a class="nav-link" th:href="@{/employers/profile}">
                <i class="bi bi-building me-2"></i>Company Profile
            </a>
        </li>

        <!-- Seeker Sidebar -->
        <li class="nav-item" sec:authorize="hasRole('SEEKER')">
            <a class="nav-link" th:href="@{/profile}">
                <i class="bi bi-person me-2"></i>My Profile
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SEEKER')">
            <a class="nav-link" th:href="@{/resume}">
                <i class="bi bi-file-earmark-person me-2"></i>My Resume
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SEEKER')">
            <a class="nav-link" th:href="@{/applications}">
                <i class="bi bi-file-earmark-text me-2"></i>Applications
            </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SEEKER')">
            <a class="nav-link" th:href="@{/favorites}">
                <i class="bi bi-heart me-2"></i>Saved Jobs
            </a>
        </li>

        <hr>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/notifications}">
                <i class="bi bi-bell me-2"></i>Notifications
            </a>
        </li>
    </ul>
</nav>
</body>
</html>
