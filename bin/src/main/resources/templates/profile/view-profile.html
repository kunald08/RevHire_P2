<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="'RevHire — ' + ${profile.userName} + '''s Profile'">RevHire — Profile</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-4">
        <!-- Profile Header -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                             style="width: 80px; height: 80px; font-size: 2rem; overflow: hidden;">
                            <img th:if="${profile.profilePictureUrl != null and !profile.profilePictureUrl.isEmpty()}"
                                 th:src="${profile.profilePictureUrl}" alt="Profile Photo"
                                 style="width:100%; height:100%; object-fit:cover;">
                            <span th:if="${profile.profilePictureUrl == null or profile.profilePictureUrl.isEmpty()}"
                                  th:text="${profile.userName != null ? profile.userName.substring(0, 1).toUpperCase() : '?'}">K</span>
                        </div>
                    </div>
                    <div class="col">
                        <h2 class="mb-1 fw-bold" th:text="${profile.userName}">User Name</h2>
                        <p class="text-muted mb-1" th:if="${profile.headline}" th:text="${profile.headline}">Headline</p>
                        <div class="d-flex gap-3 text-muted small">
                            <span th:if="${profile.userLocation}"><i class="bi bi-geo-alt me-1"></i><span th:text="${profile.userLocation}"></span></span>
                            <span th:if="${profile.currentEmploymentStatus}">
                                <i class="bi bi-briefcase me-1"></i><span th:text="${profile.currentEmploymentStatus}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div th:if="${profile.summary}" class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-person-lines-fill me-2 text-primary"></i>About</h5>
                <p class="card-text" th:text="${profile.summary}">Summary</p>
            </div>
        </div>

        <!-- Education -->
        <div th:if="${!profile.educations.empty}" class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-mortarboard me-2 text-primary"></i>Education</h5>
                <div th:each="edu : ${profile.educations}" class="border-bottom py-3">
                    <h6 class="mb-1 fw-semibold">
                        <span th:text="${edu.degree}">Degree</span>
                        <span th:if="${edu.fieldOfStudy}"> in <span th:text="${edu.fieldOfStudy}"></span></span>
                    </h6>
                    <p class="mb-1 text-muted" th:text="${edu.institution}">Institution</p>
                    <small class="text-muted">
                        <span th:if="${edu.startDate}" th:text="${edu.startDate}"></span>
                        <span th:if="${edu.endDate}"> — <span th:text="${edu.endDate}"></span></span>
                        <span th:if="${edu.grade}" class="ms-2">| Grade: <span th:text="${edu.grade}"></span></span>
                    </small>
                </div>
            </div>
        </div>

        <!-- Experience -->
        <div th:if="${!profile.experiences.empty}" class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-briefcase me-2 text-primary"></i>Work Experience</h5>
                <div th:each="exp : ${profile.experiences}" class="border-bottom py-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6 class="mb-1 fw-semibold" th:text="${exp.title}">Title</h6>
                            <p class="mb-1" th:text="${exp.company}">Company</p>
                            <small class="text-muted" th:if="${exp.location}" th:text="${exp.location}">Location</small>
                        </div>
                        <span th:if="${exp.isCurrent}" class="badge bg-success">Current</span>
                    </div>
                    <small class="text-muted d-block mt-1">
                        <span th:if="${exp.startDate}" th:text="${exp.startDate}"></span>
                        <span th:if="${exp.endDate}"> — <span th:text="${exp.endDate}"></span></span>
                        <span th:if="${exp.isCurrent}"> — Present</span>
                    </small>
                    <p th:if="${exp.description}" class="mt-2 small" th:text="${exp.description}">Description</p>
                </div>
            </div>
        </div>

        <!-- Skills -->
        <div th:if="${!profile.skills.empty}" class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-tools me-2 text-primary"></i>Skills</h5>
                <div class="d-flex flex-wrap gap-2">
                    <span th:each="skill : ${profile.skills}" class="badge bg-primary bg-opacity-10 text-primary border border-primary px-3 py-2">
                        <span th:text="${skill.name}">Skill</span>
                        <small th:if="${skill.proficiency}" class="ms-1 text-muted" th:text="'(' + ${skill.proficiency} + ')'"></small>
                    </span>
                </div>
            </div>
        </div>

        <!-- Certifications -->
        <div th:if="${!profile.certifications.empty}" class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-award me-2 text-primary"></i>Certifications</h5>
                <div th:each="cert : ${profile.certifications}" class="border-bottom py-3">
                    <h6 class="mb-1 fw-semibold" th:text="${cert.name}">Certification</h6>
                    <p th:if="${cert.issuingOrg}" class="mb-1 text-muted" th:text="${cert.issuingOrg}"></p>
                    <small class="text-muted">
                        <span th:if="${cert.issueDate}">Issued: <span th:text="${cert.issueDate}"></span></span>
                        <span th:if="${cert.expiryDate}" class="ms-2">Expires: <span th:text="${cert.expiryDate}"></span></span>
                    </small>
                    <div th:if="${cert.credentialUrl}">
                        <a th:href="${cert.credentialUrl}" target="_blank" class="small text-decoration-none">
                            <i class="bi bi-link-45deg"></i>View Credential
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact (for employers) -->
        <div class="card border-0 shadow-sm mb-4" sec:authorize="hasAuthority('EMPLOYER')">
            <div class="card-body">
                <h5 class="card-title fw-bold"><i class="bi bi-envelope me-2 text-primary"></i>Contact Information</h5>
                <p th:if="${profile.userEmail}"><i class="bi bi-envelope me-2"></i><span th:text="${profile.userEmail}"></span></p>
                <p th:if="${profile.userPhone}"><i class="bi bi-telephone me-2"></i><span th:text="${profile.userPhone}"></span></p>
                <p th:if="${profile.userLocation}"><i class="bi bi-geo-alt me-2"></i><span th:text="${profile.userLocation}"></span></p>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
