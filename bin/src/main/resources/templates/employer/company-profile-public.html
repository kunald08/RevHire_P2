<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<head>
    <title>RevHire — Company Profile</title>
</head>
<body>
    <style>
        /* ── Cover Banner ── */
        .company-cover {
            height: 180px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
            border-radius: 0 0 24px 24px;
            position: relative;
        }
        .company-cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            border-radius: 0 0 24px 24px;
        }

        /* ── Logo Avatar ── */
        .company-logo-wrap {
            display: inline-block;
            margin-top: -50px;
            z-index: 2;
            position: relative;
        }
        .company-logo {
            width: 100px;
            height: 100px;
            border-radius: 18px;
            border: 4px solid #fff;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }

        /* ── Cards ── */
        .cp-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            background: #fff;
        }

        /* ── Section Header ── */
        .sec-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #f3f4f6;
        }
        .sec-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .sec-icon.info  { background: #eef2ff; color: #4f46e5; }
        .sec-icon.about { background: #faf5ff; color: #7c3aed; }

        /* ── Info Rows ── */
        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.85rem 0;
            border-bottom: 1px solid #f9fafb;
        }
        .info-row:last-child { border-bottom: none; }
        .info-row .info-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .info-row .info-label {
            font-size: 0.76rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 2px;
        }
        .info-row .info-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1f2937;
            word-break: break-word;
        }

        .icon-industry { background: #eef2ff; color: #4f46e5; }
        .icon-size     { background: #ecfdf5; color: #10b981; }
        .icon-location { background: #fef3c7; color: #f59e0b; }
        .icon-website  { background: #e0f2fe; color: #0ea5e9; }

        .about-text {
            color: #374151;
            line-height: 1.85;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        .website-link {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }
        .website-link:hover {
            text-decoration: underline;
            color: #4338ca;
        }
    </style>

    <!-- ── Cover ── -->
    <div class="company-cover" style="margin: -1.5rem -0.75rem 0;"></div>

    <div style="max-width: 960px; margin: 0 auto; padding: 0 1rem;">

        <div class="row g-4 mt-0">

            <!-- ── LEFT ── -->
            <div class="col-lg-4">

                <!-- Identity Card -->
                <div class="cp-card p-4 text-center mb-4">
                    <div class="company-logo-wrap">
                        <div class="company-logo">
                            <span th:text="${employer.companyName != null ? employer.companyName.substring(0,1).toUpperCase() : 'C'}"></span>
                        </div>
                    </div>
                    <h4 class="fw-bold mt-3 mb-1" th:text="${employer.companyName}">Company Name</h4>
                    <p class="text-muted mb-0" th:text="${employer.industry}">Industry</p>
                </div>

                <!-- Quick Info -->
                <div class="cp-card p-4">
                    <div class="sec-header">
                        <div class="sec-icon info"><i class="bi bi-info-circle"></i></div>
                        <h5 class="fw-bold mb-0">Company Info</h5>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-industry"><i class="bi bi-briefcase"></i></div>
                        <div>
                            <div class="info-label">Industry</div>
                            <div class="info-value" th:text="${employer.industry ?: 'Not specified'}">Tech</div>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-size"><i class="bi bi-people"></i></div>
                        <div>
                            <div class="info-label">Company Size</div>
                            <div class="info-value" th:text="${employer.companySize ?: 'Not specified'}">50-100</div>
                        </div>
                    </div>

                    <div class="info-row">
                        <div class="info-icon icon-location"><i class="bi bi-geo-alt"></i></div>
                        <div>
                            <div class="info-label">Headquarters</div>
                            <div class="info-value" th:text="${employer.location ?: 'Not specified'}">Location</div>
                        </div>
                    </div>

                    <div class="info-row" th:if="${employer.website != null and !employer.website.isEmpty()}">
                        <div class="info-icon icon-website"><i class="bi bi-globe"></i></div>
                        <div>
                            <div class="info-label">Website</div>
                            <div class="info-value">
                                <a class="website-link" th:href="${employer.website}" th:text="${employer.website}" target="_blank" rel="noopener"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── RIGHT ── -->
            <div class="col-lg-8">

                <!-- About Section -->
                <div class="cp-card p-4 mb-4">
                    <div class="sec-header">
                        <div class="sec-icon about"><i class="bi bi-card-text"></i></div>
                        <h5 class="fw-bold mb-0">About the Company</h5>
                    </div>

                    <div th:if="${employer.description != null and !employer.description.isEmpty()}">
                        <p class="about-text" th:text="${employer.description}">Company description here.</p>
                    </div>
                    <div th:unless="${employer.description != null and !employer.description.isEmpty()}"
                         class="text-center py-4" style="border:2px dashed #e5e7eb;border-radius:14px;background:#fafbfc;">
                        <i class="bi bi-card-text text-muted" style="font-size:1.5rem;display:block;margin-bottom:0.5rem;"></i>
                        <span class="text-muted">No company description available.</span>
                    </div>
                </div>

                <!-- Active Jobs Summary -->
                <div class="cp-card p-4">
                    <div class="sec-header">
                        <div class="sec-icon info"><i class="bi bi-briefcase"></i></div>
                        <h5 class="fw-bold mb-0">Open Positions</h5>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div style="font-size:2rem;font-weight:700;color:#4f46e5;" th:text="${employer.activeJobs}">0</div>
                        <div>
                            <div class="fw-semibold">Active Job Listings</div>
                            <div class="text-muted" style="font-size:0.85rem;">Currently hiring</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
