<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RevHire — Login</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-primary display-4"></i>
                        <h2 class="fw-bold mt-2">Welcome Back</h2>
                        <p class="text-muted">Login to your RevHire account</p>
                    </div>

                    <div th:if="${param.success}" class="alert alert-success py-2 small">
                        <i class="bi bi-check-circle me-2"></i>Registration successful! Please login.
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle me-2"></i>Invalid email or password.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info py-2 small">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="username" class="form-control" placeholder="name@example.com" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">Remember me</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Login</button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <p class="text-center mb-0 text-muted small">
                        New to RevHire? <a th:href="@{/auth/register}" class="text-decoration-none fw-bold">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
